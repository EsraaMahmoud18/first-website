<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      /* Navbar */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #0077b6;
        padding: 10px 20px;
      }

      .logo {
        color: white;
        font-size: 22px;
        font-weight: bold;
      }

      .nav-links {
        list-style: none;
        display: flex;
        gap: 20px;
      }

      .nav-links li {
        display: inline;
      }

      .nav-links a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        transition: 0.3s;
      }

      .nav-links a:hover {
        color: #90e0ef;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .nav-links {
          display: none;
        }
      }
      /* TODO: Add your navbar styles here */

      .content {
        padding: 40px;
      }
    </style>
  </head>
